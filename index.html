<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Informacje o Spółkach</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 400px; margin-top: 20px; display: none; }
        select { padding: 8px; width: 100%; max-width: 420px; }
        h2 { color: #2c3e50; }
    </style>
</head>
<body>

    <h2>Wybierz spółkę z listy:</h2>
    
    <select id="listaSpolek">
        <option value="">-- Ładowanie danych... --</option>
    </select>

    <div id="detale" class="box">
        <h3 id="nazwaSpolki"></h3>
        <p><strong>ISIN:</strong> <span id="isin"></span></p>
        <p><strong>Sektor:</strong> <span id="sektor"></span></p>
        <p><strong>Liczba akcji:</strong> <span id="akcje"></span></p>
    </div>

    <script>
        const select = document.getElementById('listaSpolek');
        const box = document.getElementById('detale');
        let daneSpolek = [];

        // 1. Pobieranie danych z pliku Dane/Dane.json
        fetch('Dane/Dane.json')
            .then(response => {
                if (!response.ok) throw new Error('Nie znaleziono pliku JSON');
                return response.json();
            })
            .then(data => {
                daneSpolek = data;
                // Czyścimy komunikat o ładowaniu
                select.innerHTML = '<option value="">Wybierz spółkę...</option>';
                
                // Dodajemy każdą spółkę do listy <select>
                data.forEach((spolka, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = `${spolka.ticker} (${spolka.isin})`;
                    select.appendChild(option);
                });
            })
            .catch(error => {
                console.error('Błąd:', error);
                select.innerHTML = '<option value="">Błąd ładowania danych</option>';
            });

        // 2. Reakcja na wybór z listy
        select.addEventListener('change', (e) => {
            const index = e.target.value;
            
            if (index === "") {
                box.style.display = 'none';
                return;
            }

            const info = daneSpolek[index];
            document.getElementById('nazwaSpolki').textContent = info.ticker;
            document.getElementById('isin').textContent = info.isin;
            document.getElementById('sektor').textContent = info.sektor;
            document.getElementById('akcje').textContent = info.liczba_akcji.toLocaleString(); // Ładne formatowanie liczb
            
            box.style.display = 'block';
        });
    </script>

</body>
</html>
